<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 370" width="100%" height="100%">
  <defs>
    <filter id="chunkyShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="5" dy="5" stdDeviation="0" flood-color="#1a1a2e"/>
    </filter>
  </defs>

  <!-- Container Box -->
  <rect x="8" y="8" width="784" height="354" rx="20" ry="20" fill="#FFFFFF" stroke="#1a1a2e" stroke-width="4" filter="url(#chunkyShadow)"/>

  <!-- Card Title -->
  <text x="30" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="19" font-weight="900" fill="#6C5CE7">🛠️ How To Use The 3 Major Features</text>

  <!-- Feature 1 Card -->
  <g transform="translate(30, 52)">
    <rect x="0" y="0" width="740" height="88" rx="12" fill="#F0E6FF" stroke="#6C5CE7" stroke-width="2.5"/>
    <text x="18" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" fill="#6C5CE7">⚡ Feature 1: Universal Double-Click &amp; Unlimited Live Dictionary</text>
    <text x="18" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#334155">1. Open any deck in Anki and start reviewing cards.</text>
    <text x="18" y="68" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#334155">2. Double-click ANY medical word, drug, or symptom to open live Wikipedia REST API definitions.</text>
  </g>

  <!-- Feature 2 Card -->
  <g transform="translate(30, 150)">
    <rect x="0" y="0" width="740" height="88" rx="12" fill="#E6FFF9" stroke="#00D9C0" stroke-width="2.5"/>
    <text x="18" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" fill="#008070">🔊 Feature 2: Free Instant Audio Pronunciation Engine</text>
    <text x="18" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#334155">1. Inside the popup toolbar, click the vibrant 🔊 Audio button.</text>
    <text x="18" y="68" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#334155">2. Streams native medical English audio with an offline Web Speech API fallback (100% Free!).</text>
  </g>

  <!-- Feature 3 Card -->
  <g transform="translate(30, 248)">
    <rect x="0" y="0" width="740" height="88" rx="12" fill="#FFE6E6" stroke="#FF85A2" stroke-width="2.5"/>
    <text x="18" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" fill="#D6335C">🖼️ Feature 3: Clinical &amp; Pathological Atlas Gallery</text>
    <text x="18" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#334155">1. Scroll down to the 🖼️ Clinical &amp; Pathological Atlas section in the popup window.</text>
    <text x="18" y="68" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#334155">2. Automatically pulls 3 high-res histology slides, radiology scans &amp; diagrams. Click slide to expand!</text>
  </g>
</svg>
