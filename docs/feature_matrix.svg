<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 310" width="100%" height="100%">
  <defs>
    <filter id="chunkyShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="5" dy="5" stdDeviation="0" flood-color="#1a1a2e"/>
    </filter>
  </defs>

  <!-- Container Box -->
  <rect x="8" y="8" width="784" height="294" rx="20" ry="20" fill="#FFFFFF" stroke="#1a1a2e" stroke-width="4" filter="url(#chunkyShadow)"/>

  <!-- Card Title -->
  <text x="30" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="19" font-weight="900" fill="#6C5CE7">📊 Feature Matrix Comparison</text>

  <!-- Table Container -->
  <g transform="translate(30, 52)">
    <!-- Header Row -->
    <rect x="0" y="0" width="740" height="38" rx="8" fill="#6C5CE7" stroke="#1a1a2e" stroke-width="2"/>
    <text x="20" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" fill="#FFFFFF">Feature</text>
    <text x="270" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" fill="#FFFFFF">Original Add-on</text>
    <text x="510" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" fill="#FFFFFF">Enhanced Edition (safevoice009)</text>

    <!-- Row 1 -->
    <rect x="0" y="42" width="740" height="36" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="20" y="65" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#1E293B">🌐 Medical Dictionary</text>
    <text x="270" y="65" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#64748B">~450 fixed local terms</text>
    <text x="510" y="65" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="800" fill="#008070">100% Unlimited (Live Wiki API)</text>

    <!-- Row 2 -->
    <rect x="0" y="82" width="740" height="36" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="20" y="105" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#1E293B">💡 Exam Traps &amp; Mnemonics</text>
    <text x="270" y="105" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#64748B">Template placeholders</text>
    <text x="510" y="105" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="800" fill="#008070">Dynamic Pearl Synthesizer</text>

    <!-- Row 3 -->
    <rect x="0" y="122" width="740" height="36" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="20" y="145" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#1E293B">🔊 Audio Pronunciation</text>
    <text x="270" y="145" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#EF4444">❌ None</text>
    <text x="510" y="145" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="800" fill="#008070">🔊 Free Neural Audio Stream</text>

    <!-- Row 4 -->
    <rect x="0" y="162" width="740" height="36" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="20" y="185" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#1E293B">🖼️ Clinical Atlas Gallery</text>
    <text x="270" y="185" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#EF4444">❌ None</text>
    <text x="510" y="185" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="800" fill="#008070">🖼️ Auto Histology/CT Slides</text>

    <!-- Row 5 -->
    <rect x="0" y="202" width="740" height="36" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="20" y="225" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#1E293B">🪟 Desktop Window</text>
    <text x="270" y="225" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#64748B">Fixed overlay</text>
    <text x="510" y="225" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="800" fill="#008070">Movable Window (Stays On Top)</text>
  </g>
</svg>
