<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="100%" height="100%">
  <defs>
    <filter id="chunkyShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="5" dy="5" stdDeviation="0" flood-color="#1a1a2e"/>
    </filter>
  </defs>

  <!-- Container Box -->
  <rect x="8" y="8" width="784" height="424" rx="20" ry="20" fill="#FFFFFF" stroke="#1a1a2e" stroke-width="4" filter="url(#chunkyShadow)"/>

  <!-- Card Title -->
  <text x="30" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="19" font-weight="900" fill="#6C5CE7">🧠 System Architecture &amp; Workflow Mindmap</text>

  <!-- Step 1 -->
  <g transform="translate(30, 52)">
    <rect x="0" y="0" width="740" height="48" rx="10" fill="#F0E6FF" stroke="#6C5CE7" stroke-width="2.5"/>
    <text x="18" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="800" fill="#6C5CE7">1️⃣ 🃏 Anki Flashcard Review (USMLE / PLAB / UPSC / Any Deck)</text>
    <text x="18" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11.5" font-weight="500" fill="#475569">Double-click ANY word or phrase on your card screen to initiate live dictionary search.</text>
  </g>

  <!-- Arrow 1 -->
  <text x="400" y="112" font-family="sans-serif" font-size="12" font-weight="900" fill="#6C5CE7" text-anchor="middle">⬇️</text>

  <!-- Step 2 -->
  <g transform="translate(30, 116)">
    <rect x="0" y="0" width="740" height="48" rx="10" fill="#E6FFF9" stroke="#00D9C0" stroke-width="2.5"/>
    <text x="18" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="800" fill="#008070">2️⃣ ⚡ Smart Term Matcher &amp; Suffix Engine</text>
    <text x="18" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11.5" font-weight="500" fill="#475569">Searches local database (564+ terms) with automatic suffix matching (-s, -es, -ed, -ing).</text>
  </g>

  <!-- Arrow 2 -->
  <text x="400" y="176" font-family="sans-serif" font-size="12" font-weight="900" fill="#00D9C0" text-anchor="middle">⬇️</text>

  <!-- Step 3 -->
  <g transform="translate(30, 180)">
    <rect x="0" y="0" width="740" height="48" rx="10" fill="#FFF9E6" stroke="#FFD93D" stroke-width="2.5"/>
    <text x="18" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="800" fill="#B38F00">3️⃣ 🌐 Live Wikipedia Medical REST API Fallback</text>
    <text x="18" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11.5" font-weight="500" fill="#475569">If missing locally, queries live Wikipedia Medical API over the internet. 100% term coverage!</text>
  </g>

  <!-- Arrow 3 -->
  <text x="400" y="240" font-family="sans-serif" font-size="12" font-weight="900" fill="#FFD93D" text-anchor="middle">⬇️</text>

  <!-- Step 4 -->
  <g transform="translate(30, 244)">
    <rect x="0" y="0" width="740" height="48" rx="10" fill="#FFE6E6" stroke="#FF85A2" stroke-width="2.5"/>
    <text x="18" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="800" fill="#D6335C">4️⃣ 🖼️ Clinical &amp; Pathological Atlas Gallery</text>
    <text x="18" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11.5" font-weight="500" fill="#475569">Automatically embeds 3 high-res clinical photos, histology slides, and radiology scans from Wikimedia Commons.</text>
  </g>

  <!-- Arrow 4 -->
  <text x="400" y="304" font-family="sans-serif" font-size="12" font-weight="900" fill="#FF85A2" text-anchor="middle">⬇️</text>

  <!-- Step 5 -->
  <g transform="translate(30, 308)">
    <rect x="0" y="0" width="740" height="48" rx="10" fill="#F0F4FF" stroke="#54A0FF" stroke-width="2.5"/>
    <text x="18" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="800" fill="#1E5BB8">5️⃣ 🔊 Free Neural Audio Pronunciation Engine</text>
    <text x="18" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11.5" font-weight="500" fill="#475569">Click 🔊 Audio inside toolbar to stream native medical English audio &amp; offline Web Speech fallback.</text>
  </g>

  <!-- Arrow 5 -->
  <text x="400" y="368" font-family="sans-serif" font-size="12" font-weight="900" fill="#54A0FF" text-anchor="middle">⬇️</text>

  <!-- Step 6 -->
  <g transform="translate(30, 372)">
    <rect x="0" y="0" width="740" height="46" rx="10" fill="#FAF5FF" stroke="#9333EA" stroke-width="2.5"/>
    <text x="370" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="800" fill="#7E22CE" text-anchor="middle">6️⃣ 🪟 Renders in Movable Desktop Window (WindowStaysOnTopHint pinned on top of Anki)</text>
  </g>
</svg>
