<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 390" width="100%" height="100%">
  <defs>
    <filter id="chunkyShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="5" dy="5" stdDeviation="0" flood-color="#1a1a2e"/>
    </filter>
  </defs>

  <!-- Container Box -->
  <rect x="8" y="8" width="784" height="374" rx="20" ry="20" fill="#FFFFFF" stroke="#1a1a2e" stroke-width="4" filter="url(#chunkyShadow)"/>

  <!-- Card Title -->
  <text x="30" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="900" fill="#6C5CE7">🧠 System Architecture &amp; Workflow Mindmap</text>

  <!-- Step 1 -->
  <g transform="translate(30, 58)">
    <rect x="0" y="0" width="740" height="52" rx="12" fill="#F0E6FF" stroke="#6C5CE7" stroke-width="2.5"/>
    <text x="20" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" fill="#6C5CE7">1️⃣ 🃏 Anki Flashcard Review (USMLE / PLAB / UPSC / Any Deck)</text>
    <text x="20" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#475569">Double-click ANY word or phrase on your card screen to initiate live dictionary search.</text>
  </g>

  <!-- Arrow 1 -->
  <text x="400" y="125" font-family="sans-serif" font-size="14" font-weight="900" fill="#6C5CE7" text-anchor="middle">⬇️</text>

  <!-- Step 2 -->
  <g transform="translate(30, 131)">
    <rect x="0" y="0" width="740" height="52" rx="12" fill="#E6FFF9" stroke="#00D9C0" stroke-width="2.5"/>
    <text x="20" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" fill="#008070">2️⃣ ⚡ Smart Term Matcher &amp; Suffix Engine</text>
    <text x="20" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#475569">Searches local database (564+ terms, 2,695 patterns) with automatic suffix matching (-s, -es, -ed, -ing).</text>
  </g>

  <!-- Arrow 2 -->
  <text x="400" y="198" font-family="sans-serif" font-size="14" font-weight="900" fill="#00D9C0" text-anchor="middle">⬇️</text>

  <!-- Step 3 -->
  <g transform="translate(30, 204)">
    <rect x="0" y="0" width="740" height="52" rx="12" fill="#FFF9E6" stroke="#FFD93D" stroke-width="2.5"/>
    <text x="20" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" fill="#B38F00">3️⃣ 🌐 Wikipedia Medical REST API Fallback</text>
    <text x="20" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#475569">If missing locally, queries live Wikipedia Medical API over the internet. 100% term coverage guaranteed!</text>
  </g>

  <!-- Arrow 3 -->
  <text x="400" y="271" font-family="sans-serif" font-size="14" font-weight="900" fill="#FFD93D" text-anchor="middle">⬇️</text>

  <!-- Step 4 -->
  <g transform="translate(30, 277)">
    <rect x="0" y="0" width="740" height="52" rx="12" fill="#FFE6E6" stroke="#FF85A2" stroke-width="2.5"/>
    <text x="20" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" fill="#D6335C">4️⃣ 💡 High-Yield Exam Traps &amp; Mnemonics Synthesizer</text>
    <text x="20" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#475569">Extracts board exam traps, precautions, mnemonics, and clinical pearls (e.g. Folate/B12, Iron toxicity).</text>
  </g>

  <!-- Arrow 4 -->
  <text x="400" y="344" font-family="sans-serif" font-size="14" font-weight="900" fill="#FF85A2" text-anchor="middle">⬇️</text>

  <!-- Step 5 -->
  <g transform="translate(30, 350)">
    <rect x="0" y="0" width="740" height="24" rx="8" fill="#F0F4FF" stroke="#54A0FF" stroke-width="1.5"/>
    <text x="370" y="16" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="800" fill="#1E5BB8" text-anchor="middle">5️⃣ 🪟 Renders in Movable Desktop Window (Pinned WindowStaysOnTopHint on top of Anki)</text>
  </g>
</svg>
