<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="100%">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="50%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="chunkyShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="6" dy="6" stdDeviation="0" flood-color="#1a1a2e"/>
    </filter>
  </defs>

  <!-- Background Card -->
  <rect x="8" y="8" width="784" height="204" rx="20" ry="20" fill="url(#heroGrad)" stroke="#1a1a2e" stroke-width="4" filter="url(#chunkyShadow)"/>

  <!-- Pill Badges Bar -->
  <g transform="translate(24, 24)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="120" height="30" rx="9" fill="#FFFFFF" stroke="#1a1a2e" stroke-width="2"/>
    <text x="60" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="800" fill="#6C5CE7" text-anchor="middle">🩺 2026 Edition</text>

    <!-- Pill 2 -->
    <rect x="130" y="0" width="135" height="30" rx="9" fill="#FFD93D" stroke="#1a1a2e" stroke-width="2"/>
    <text x="197" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="800" fill="#1a1a2e" text-anchor="middle">⚡ Live Wiki API</text>

    <!-- Pill 3 -->
    <rect x="275" y="0" width="135" height="30" rx="9" fill="#00D9C0" stroke="#1a1a2e" stroke-width="2"/>
    <text x="342" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="800" fill="#1a1a2e" text-anchor="middle">🔊 Audio Engine</text>

    <!-- Pill 4 -->
    <rect x="420" y="0" width="140" height="30" rx="9" fill="#FF85A2" stroke="#1a1a2e" stroke-width="2"/>
    <text x="490" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="800" fill="#FFFFFF" text-anchor="middle">🖼️ Clinical Atlas</text>

    <!-- Pill 5 -->
    <rect x="570" y="0" width="180" height="30" rx="9" fill="#6C5CE7" stroke="#FFFFFF" stroke-width="2"/>
    <text x="660" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="800" fill="#FFFFFF" text-anchor="middle">⭐ Anki 2.1 / 23 / 24+</text>
  </g>

  <!-- Title Text -->
  <text x="24" y="108" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="900" fill="#FFFFFF" filter="drop-shadow(2px 2px 0px #1a1a2e)">Medical Terms Glossary &amp; Instant Dictionary</text>
  
  <!-- Subtitle -->
  <text x="24" y="142" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="#F1F5F9" opacity="0.95">EnterMedSchool Enhanced Edition • High-Yield Medical Engine by safevoice009</text>

  <!-- Bottom Accent Strip -->
  <rect x="24" y="165" width="752" height="6" rx="3" fill="#00D9C0" stroke="#1a1a2e" stroke-width="1.5"/>
</svg>
